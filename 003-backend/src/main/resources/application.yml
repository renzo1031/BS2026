server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: left-behind-children-aid-platform
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:left_behind_aid}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 10000
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-this-jwt-secret-before-production-2026}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  pii:
    key: ${PII_ENCRYPTION_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    root: INFO
    com.leftbehind.aid: INFO
