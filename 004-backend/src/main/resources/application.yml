spring:
  application:
    name: campus-buddy-backend
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_buddy?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:campus_buddy_redis_dev}
      timeout: 2s
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 9MB
  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

campus-buddy:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-minutes: ${JWT_ACCESS_MINUTES:120}
  identity:
    hmac-secret: ${IDENTITY_HMAC_SECRET:}
    encryption-secret: ${IDENTITY_ENCRYPTION_SECRET:}
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    dev-login-enabled: ${WECHAT_DEV_LOGIN_ENABLED:false}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:campus-buddy-private}
  cors:
    # Local development serves the admin SPA on 5174; production must override this with an explicit allowlist.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
